name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  colony-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run colony-lint
        run: ./tools/colony-lint.sh
