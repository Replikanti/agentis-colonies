# Planning Colony Configuration
#
# Part of the Dev Apprenticeship federation.
# Copy to colony.toml and edit for your environment.

[colony]
name = "planning"
tick_interval_ms = 60000

[gitlab]
url = "https://gitlab.example.com"
token = "glpat-your-token-here"
project = "your-org/your-project"

[llm]
backend = "cli"
command = "claude"

# Agent definitions
# Each agent runs as a separate agentis daemon process.
# They discover each other via colony UDP and communicate over TCP emit/listen.

[[agents]]
name = "scope_estimator"
source = "agents/scope_estimator.ag"
cb_budget = 800
tick_interval_ms = 60000

[[agents]]
name = "risk_assessor"
source = "agents/risk_assessor.ag"
cb_budget = 600
tick_interval_ms = 60000

[[agents]]
name = "task_decomposer"
source = "agents/task_decomposer.ag"
cb_budget = 1000
tick_interval_ms = 60000

[[agents]]
name = "plan_reviewer"
source = "agents/plan_reviewer.ag"
cb_budget = 800
tick_interval_ms = 60000
