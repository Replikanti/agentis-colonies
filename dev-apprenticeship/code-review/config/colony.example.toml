# Code Review Colony Configuration
#
# Part of the Dev Apprenticeship federation.
# Copy to colony.toml and edit for your environment.

[colony]
name = "code-review"
tick_interval_ms = 60000

[gitlab]
url = "https://gitlab.example.com"
token = "glpat-your-token-here"
project = "your-org/your-project"

[llm]
backend = "cli"
command = "claude"

# Agent definitions
# Each agent runs as a separate agentis daemon process.
# They discover each other via colony UDP and communicate over TCP emit/listen.

[[agents]]
name = "style_reviewer"
source = "agents/style_reviewer.ag"
cb_budget = 600
tick_interval_ms = 60000

[[agents]]
name = "logic_reviewer"
source = "agents/logic_reviewer.ag"
cb_budget = 1000
tick_interval_ms = 60000

[[agents]]
name = "security_reviewer"
source = "agents/security_reviewer.ag"
cb_budget = 800
tick_interval_ms = 60000

[[agents]]
name = "test_reviewer"
source = "agents/test_reviewer.ag"
cb_budget = 800
tick_interval_ms = 60000

[[agents]]
name = "approval_decider"
source = "agents/approval_decider.ag"
cb_budget = 600
tick_interval_ms = 60000
